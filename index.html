<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rubah Warna | Pengecatan Modern & Rapi</title>
  <meta name="description"
    content="Rubah Warna adalah bisnis pengecatan profesional untuk rumah, kantor, dan komersial. Hasil rapi, cepat, dan tahan lama." />

  <!-- DNS Prefetch for external domains -->
  <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
  <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
  <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com" />

  <!-- Preconnect to critical external domains -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Google Fonts - Optimized with font-display: swap -->
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet" />

  <!-- Critical CSS inlined for faster FCP -->
  <style>
    /* Critical above-the-fold styles */
    body {
      margin: 0;
      font-family: "IBM Plex Sans", sans-serif;
      background: radial-gradient(circle at top, var(--bg-1), var(--bg-2) 45%, var(--bg-3) 100%);
      color: var(--ink);
      line-height: 1.6
    }

    .hero {
      padding: clamp(24px, 3vw, 48px) 0 clamp(72px, 6vw, 120px);
      position: relative;
      overflow: hidden
    }

    .container {
      width: min(1140px, 90%);
      margin: 0 auto
    }

    .hero-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 56px;
      align-items: center
    }

    h1 {
      font-size: clamp(2.4rem, 2vw+1.8rem, 3.4rem);
      letter-spacing: -0.02em;
      font-weight: 700;
      margin: 0 0 12px;
      line-height: 1.15
    }

    .lead {
      font-size: 1.1rem;
      max-width: 540px
    }

    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.2em;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--forest);
      margin-bottom: 12px
    }

    .hero-actions {
      display: flex;
      gap: clamp(50px, 4vw, 60px);
      margin: 32px 0 40px;
      flex-wrap: wrap;
      justify-content: center
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 24px;
      border-radius: 999px;
      font-weight: 700;
      cursor: pointer
    }

    .hero-stats {
      display: flex;
      gap: 28px;
      flex-wrap: wrap
    }

    .hero-stats div {
      background: color-mix(in srgb, var(--card) 80%, transparent);
      border: 3px solid var(--border);
      padding: 10px 14px;
      border-radius: 16px;
      min-width: 140px
    }

    .hero-stats h3 {
      margin-bottom: 6px;
      font-size: 1.4rem
    }

    .hero-stats p {
      margin: 0;
      font-size: 0.9rem;
      color: color-mix(in srgb, var(--ink) 70%, transparent)
    }

    .reveal {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.6s ease, transform 0.6s ease
    }

    .reveal.show {
      opacity: 1;
      transform: translateY(0)
    }

    @media(max-width:720px) {
      .hero {
        padding: 20px 0 40px !important
      }

      .hero-stats {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px 18px
      }

      .hero-stats>div:last-child {
        grid-column: 1/-1;
        justify-self: center;
        width: min(260px, 100%)
      }

      .bg-orbit {
        display: none !important
      }
    }
  </style>

  <!-- Material Symbols Outlined - Deferred for non-critical loading -->
<link rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=format_paint,imagesearch_roller" />


  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="assets/css/style.css" />
  <!-- Mobile optimizations (only loaded on mobile) -->
  <link rel="stylesheet" href="assets/css/mobile-optimizations.css" media="(max-width: 720px)">

  <!-- Font Awesome - Deferred loading -->
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/fontawesome.min.css"
    as="style" onload="this.onload=null;this.rel='stylesheet'">
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/brands.min.css" as="style"
    onload="this.onload=null;this.rel='stylesheet'">
  <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/solid.min.css" as="style"
    onload="this.onload=null;this.rel='stylesheet'">

  <!-- Noscript fallback for Font Awesome -->
  <noscript>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/fontawesome.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/brands.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/solid.min.css">
  </noscript>

  <!-- Preload critical JS -->
  <link rel="modulepreload" href="assets/js/main.js" />
  <link rel="modulepreload" href="assets/js/utils/load-includes.js" />

</head>

<body>
  <div class="bg-orbit"></div>
  <div data-include="partials/navbar.html"></div>

  <main>
    <div data-include="partials/hero.html"></div>
    <div data-include="partials/services.html"></div>
    <div data-include="partials/process.html"></div>
    <div data-include="partials/portfolio.html"></div>
    <div data-include="partials/testimonials.html"></div>
    <div data-include="partials/team.html"></div>
    <div data-include="partials/contact.html"></div>
  </main>

  <div data-include="partials/footer.html"></div>

  <!-- Load Font Awesome after page interactive -->
  <script>
    // Load Font Awesome after LCP (Largest Contentful Paint)
    if ('requestIdleCallback' in window) {
      requestIdleCallback(() => {
        document.querySelectorAll('link[as="style"][onload]').forEach(link => {
          if (link.href.includes('font-awesome') || link.href.includes('bootstrap-icons')) {
            link.onload = null;
            link.rel = 'stylesheet';
          }
        });
      }, { timeout: 3000 });
    } else {
      // Fallback for browsers without requestIdleCallback
      window.addEventListener('load', () => {
        setTimeout(() => {
          document.querySelectorAll('link[as="style"][onload]').forEach(link => {
            if (link.href.includes('font-awesome') || link.href.includes('bootstrap-icons')) {
              link.onload = null;
              link.rel = 'stylesheet';
            }
          });
        }, 1000);
      });
    }
  </script>

  <script type="module" src="assets/js/main.js"></script>
</body>

</html>
