<section id="kontak" class="section contact">
  <div class="container contact-grid">
    <div class="contact-copy reveal">
      <p class="eyebrow">Kontak</p>
      <h2>Siap ubah ruang Anda?</h2>
      <p>Kirim detail proyek dan tim kami akan kembali maksimal 1x24 jam.</p>
      <div class="contact-info">
        <div>
          <span>Telepon</span>
          <strong>+62 812-3456-7890</strong>
        </div>
        <div>
          <span>Email</span>
          <strong>halo@rubahwarna.id</strong>
        </div>
        <div>
          <span>Area Layanan</span>
          <strong>Jabodetabek & Bandung</strong>
        </div>
      </div>
    </div>
    <form class="contact-form reveal">
      <label>
        Nama
        <input type="text" placeholder="Nama lengkap" required />
      </label>
      <label>
        WhatsApp
        <input type="tel" placeholder="+62" required />
      </label>
      <label>
        Jenis proyek
        <select>
          <option>Rumah tinggal</option>
          <option>Kantor</option>
          <option>Ritel / Kafe</option>
          <option>Lainnya</option>
        </select>
      </label>
      <label>
        Catatan
        <textarea rows="4" placeholder="Ceritakan kebutuhan Anda"></textarea>
      </label>
      <button type="submit" class="btn">Kirim Permintaan</button>
      <p class="form-note">
        Dengan mengirimkan form ini, Anda setuju dihubungi oleh tim Rubah Warna.
      </p>
    </form>
  </div>
</section>
